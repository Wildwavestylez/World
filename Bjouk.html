<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bitcoin Mining Simulator</title>

<style>
    body{
        margin:0;
        background:#0f172a;
        color:white;
        font-family:Arial, Helvetica, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card{
        background:#111827;
        padding:40px;
        border-radius:24px;
        width:420px;
        box-shadow:0 0 40px rgba(0,0,0,0.4);
        text-align:center;
    }

    h1{
        margin-top:0;
        color:#f7931a;
        font-size:32px;
    }

    .value{
        font-size:38px;
        font-weight:bold;
        margin:20px 0;
    }

    .small{
        color:#9ca3af;
        font-size:14px;
    }

    .usd{
        margin-top:20px;
        font-size:28px;
        color:#22c55e;
        font-weight:bold;
    }

    .btc{
        color:#60a5fa;
        font-size:20px;
        margin-top:10px;
    }

    .footer{
        margin-top:25px;
        color:#6b7280;
        font-size:13px;
    }
</style>
</head>
<body>

<div class="card">
    <h1>⛏️ Bitcoin Mining</h1>

    <div class="small">Těžební rychlost</div>
    <div class="value">1 SAT / sekundu</div>

    <div class="small">Vytěženo</div>
    <div class="btc" id="btcAmount">0 BTC</div>

    <div class="small" style="margin-top:20px;">Hodnota</div>
    <div class="usd" id="usdValue">$0.00</div>

    <div class="footer">
        Cena BTC: $82 547.8
    </div>
</div>

<script>
    // Konstanty
    const BTC_PRICE = 82547.8;
    const SATOSHIS_PER_SECOND = 7;
    const SATOSHIS_IN_BTC = 100000000;

    // Stav
    let satoshis = 0;

    // HTML elementy
    const btcAmount = document.getElementById("btcAmount");
    const usdValue = document.getElementById("usdValue");

    function updateMining() {

        // Přidáme 1 satoshi
        satoshis += SATOSHIS_PER_SECOND;

        // Přepočet na BTC
        const btc = satoshis / SATOSHIS_IN_BTC;

        // Přepočet na USD
        const usd = btc * BTC_PRICE;

        // Výpis
        btcAmount.innerText =
            btc.toFixed(8) + " BTC";

        usdValue.innerText =
            "$" + usd.toFixed(6);
    }

    // Spustí každou sekundu
    setInterval(updateMining, 400);
</script>

</body>
</html>
